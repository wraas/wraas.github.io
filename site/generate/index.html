<script>
        // --- Minimal QR Code generator (no external dependencies) ---
        // Generates version 2-6 QR codes (Model 2) with error correction level L
        var QR = (function() {
            // GF(256) arithmetic for Reed-Solomon
            var EXP = new Uint8Array(256), LOG = new Uint8Array(256);
            (function() {
                var v = 1;
                for (var i = 0; i < 255; i++) {
                    EXP[i] = v;
                    LOG[v] = i;
                    v = (v << 1) ^ (v & 128 ? 0x11d : 0);
                }
                EXP[255] = EXP[0];
            })();

            function gfMul(a, b) { return a && b ? EXP[(LOG[a] + LOG[b]) % 255] : 0; }

            function rsGenPoly(n) {
                var p = [1];
                for (var i = 0; i < n; i++) {
                    var next = new Array(p.length + 1);
                    for (var j = 0; j < next.length; j++) next[j] = 0;
                    for (var j = 0; j < p.length; j++) {
                        next[j] ^= gfMul(p[j], EXP[i]);
                        next[j + 1] ^= p[j];
                    }
                    p = next;
                }
                return p;
            }

            function rsEncode(data, ecLen) {
                var gen = rsGenPoly(ecLen);
                var msg = new Uint8Array(data.length + ecLen);
                for (var i = 0; i < data.length; i++) msg[i] = data[i];
                for (var i = 0; i < data.length; i++) {
                    var coef = msg[i];
                    if (coef) {
                        for (var j = 0; j < gen.length; j++) {
                            msg[i + j] ^= gfMul(gen[j], coef);
                        }
                    }
                }
                return msg.slice(data.length);
            }

            // Version info: [version, size, dataCodewords, ecCodewords]
            var VERSIONS = [
                [1, 21, 19, 7], [2, 25, 34, 10], [3, 29, 55, 15],
                [4, 33, 80, 20], [5, 37, 108, 26], [6, 41, 136, 36]
            ];

            // Alignment pattern centers per version
            var ALIGN = [[], [], [6,18], [6,22], [6,26], [6,30], [6,34]];

            function selectVersion(len) {
                // Byte mode: 4 bit mode + 8/16 bit count + data
                for (var i = 0; i < VERSIONS.length; i++) {
                    var countBits = i < 9 ? 8 : 16;
                    var avail = VERSIONS[i][2] * 8;
                    if (4 + countBits + len * 8 <= avail) return VERSIONS[i];
                }
                return null;
            }

            function encode(text) {
                var data = [];
                for (var i = 0; i < text.length; i++) data.push(text.charCodeAt(i));
                var ver = selectVersion(data.length);
                if (!ver) return null;

                var version = ver[0], size = ver[1], dataCW = ver[2], ecCW = ver[3];

                // Build bit stream: byte mode (0100) + count + data + terminator + padding
                var bits = [];
                function pushBits(val, len) {
                    for (var i = len - 1; i >= 0; i--) bits.push((val >> i) & 1);
                }
                pushBits(4, 4); // byte mode
                pushBits(data.length, version >= 10 ? 16 : 8);
                for (var i = 0; i < data.length; i++) pushBits(data[i], 8);
                pushBits(0, Math.min(4, dataCW * 8 - bits.length)); // terminator
                while (bits.length % 8) bits.push(0); // byte align
                var pads = [0xEC, 0x11], pi = 0;
                while (bits.length < dataCW * 8) {
                    pushBits(pads[pi % 2], 8);
                    pi++;
                }

                // Convert to codewords
                var codewords = new Uint8Array(dataCW);
                for (var i = 0; i < dataCW; i++) {
                    var b = 0;
                    for (var j = 0; j < 8; j++) b = (b << 1) | bits[i * 8 + j];
                    codewords[i] = b;
                }

                // Reed-Solomon
                var ec = rsEncode(codewords, ecCW);

                // Build module grid
                var grid = [];
                var reserved = [];
                for (var r = 0; r < size; r++) {
                    grid[r] = new Uint8Array(size);
                    reserved[r] = new Uint8Array(size);
                }

                function setModule(r, c, val) {
                    if (r >= 0 && r < size && c >= 0 && c < size) {
                        grid[r][c] = val ? 1 : 0;
                        reserved[r][c] = 1;
                    }
                }

                // Finder patterns
                function finderPattern(row, col) {
                    for (var dr = -1; dr <= 7; dr++) {
                        for (var dc = -1; dc <= 7; dc++) {
                            var r = row + dr, c = col + dc;
                            if (r < 0 || r >= size || c < 0 || c >= size) continue;
                            var val = (dr >= 0 && dr <= 6 && (dc === 0 || dc === 6)) ||
                                      (dc >= 0 && dc <= 6 && (dr === 0 || dr === 6)) ||
                                      (dr >= 2 && dr <= 4 && dc >= 2 && dc <= 4);
                            setModule(r, c, val);
                        }
                    }
                }
                finderPattern(0, 0);
                finderPattern(0, size - 7);
                finderPattern(size - 7, 0);

                // Timing patterns
                for (var i = 8; i < size - 8; i++) {
                    setModule(6, i, i % 2 === 0);
                    setModule(i, 6, i % 2 === 0);
                }

                // Alignment patterns
                var ap = ALIGN[version];
                for (var ai = 0; ai < ap.length; ai++) {
                    for (var aj = 0; aj < ap.length; aj++) {
                        var ar = ap[ai], ac = ap[aj];
                        if (reserved[ar][ac]) continue;
                        for (var dr = -2; dr <= 2; dr++) {
                            for (var dc = -2; dc <= 2; dc++) {
                                setModule(ar + dr, ac + dc,
                                    Math.abs(dr) === 2 || Math.abs(dc) === 2 || (dr === 0 && dc === 0));
                            }
                        }
                    }
                }

                // Reserve format info areas
                for (var i = 0; i < 8; i++) {
                    if (!reserved[8]) break;
                    if (!reserved[8][i]) { reserved[8][i] = 1; }
                    if (!reserved[i][8]) { reserved[i][8] = 1; }
                    if (!reserved[8][size - 1 - i]) { reserved[8][size - 1 - i] = 1; }
                    if (!reserved[size - 1 - i][8]) { reserved[size - 1 - i][8] = 1; }
                }
                reserved[8][8] = 1;
                setModule(size - 8, 8, 1); // dark module

                // Place data bits
                var allBits = [];
                for (var i = 0; i < dataCW; i++)
                    for (var j = 7; j >= 0; j--) allBits.push((codewords[i] >> j) & 1);
                for (var i = 0; i < ecCW; i++)
                    for (var j = 7; j >= 0; j--) allBits.push((ec[i] >> j) & 1);

                var bi = 0;
                var upward = true;
                for (var col = size - 1; col >= 0; col -= 2) {
                    if (col === 6) col = 5; // skip timing column
                    var rows = upward ? [] : [];
                    for (var row = 0; row < size; row++) {
                        var r = upward ? size - 1 - row : row;
                        for (var dc = 0; dc <= 1; dc++) {
                            var c = col - dc;
                            if (c < 0 || reserved[r][c]) continue;
                            grid[r][c] = bi < allBits.length ? allBits[bi++] : 0;
                        }
                    }
                    upward = !upward;
                }

                // Apply mask 0 (checkerboard) and format info
                for (var r = 0; r < size; r++) {
                    for (var c = 0; c < size; c++) {
                        if (!reserved[r][c]) {
                            if ((r + c) % 2 === 0) grid[r][c] ^= 1;
                        }
                    }
                }

                // Format info for L level, mask 0: 0x77C4
                var fmt = 0x77C4;
                var fmtBits = [];
                for (var i = 14; i >= 0; i--) fmtBits.push((fmt >> i) & 1);
                // Place format bits
                var FORMAT_POS_H = [
                    [8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],
                    [7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]
                ];
                var FORMAT_POS_V = [];
                for (var i = 0; i < 7; i++) FORMAT_POS_V.push([size - 1 - i, 8]);
                for (var i = 0; i < 8; i++) FORMAT_POS_V.push([8, size - 8 + i]);
                for (var i = 0; i < 15; i++) {
                    grid[FORMAT_POS_H[i][0]][FORMAT_POS_H[i][1]] = fmtBits[i];
                    grid[FORMAT_POS_V[i][0]][FORMAT_POS_V[i][1]] = fmtBits[i];
                }

                return { grid: grid, size: size };
            }

            function render(canvas, text, pixelSize) {
                var qr = encode(text);
                if (!qr) return false;
                pixelSize = pixelSize || 4;
                var padding = 4;
                var totalSize = (qr.size + padding * 2) * pixelSize;
                canvas.width = totalSize;
                canvas.height = totalSize;
                var ctx = canvas.getContext("2d");
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, totalSize, totalSize);
                ctx.fillStyle = "#000000";
                for (var r = 0; r < qr.size; r++) {
                    for (var c = 0; c < qr.size; c++) {
                        if (qr.grid[r][c]) {
                            ctx.fillRect((c + padding) * pixelSize, (r + padding) * pixelSize, pixelSize, pixelSize);
                        }
                    }
                }
                return true;
            }

            return { render: render };
        })();
</script>

                        case "30d": expiresAt = now + (30 * 24 * 60 * 60); break;
                    }
                    url = url + "?expires=" + expiresAt;
                }
                outputUrl.textContent = url;

                // Detect scenario from custom path or use selected theme
                var matched = custom ? detectScenario(custom) : theme;
                var preview = scenarios[matched] || scenarios[""];
                previewTitle.textContent = preview.title;
                previewDesc.textContent = preview.desc;
                previewPun.textContent = preview.pun || "";

                // Update QR code
                QR.render(qrCanvas, url, 4);
            }

            function trackEvent(path, title) {
                if (typeof goatcounter !== "undefined" && goatcounter.count) {
                    goatcounter.count({ path: path, title: title, event: true });
                }
            }

            themeSelect.addEventListener("change", function() {
                customPath.value = "";
                showSuggestions(themeSelect.value);
                updateUrl();
                trackEvent("generate-scenario-" + (themeSelect.value || "direct"), "Scenario selected");
            });
            customPath.addEventListener("input", updateUrl);
            document.getElementById("expiry").addEventListener("change", updateUrl);
            updateUrl();

            qrDownload.addEventListener("click", function() {
                var link = document.createElement("a");
                link.download = "rickroll-qr.png";
                link.href = qrCanvas.toDataURL("image/png");
                link.click();
                trackEvent("qr-download", "QR code download");
            });

            copyBtn.addEventListener("click", function() {
                var url = outputUrl.textContent;
                navigator.clipboard.writeText(url).then(function() {
                    trackEvent("link-copy", "Link copied");
                    copyBtn.textContent = "Copied!";
                    copyBtn.classList.add("copied");
                    setTimeout(function() {
                        copyBtn.textContent = "Copy";
                        copyBtn.classList.remove("copied");
                    }, 2000);
                });
            });
        })();

        // --- Cookie consent melody ---
        (function() {
            var audioCtx = null;
            var isPlaying = false;
            var melodyTimeout = null;

            var beat = 60 / 113;
            var eighth = beat / 2;
            var quarter = beat;
            var dottedQuarter = beat * 1.5;

            var notes = [
                // Line 1: "Never gonna give you up"
                { freq: 440, dur: eighth },{ freq: 493.88, dur: eighth },{ freq: 587.33, dur: eighth },{ freq: 493.88, dur: eighth },
                { freq: 369.99, dur: quarter },{ freq: 369.99, dur: eighth },{ freq: 329.63, dur: dottedQuarter },
                // Line 2: "Never gonna let you down"
                { freq: 440, dur: eighth },{ freq: 493.88, dur: eighth },{ freq: 587.33, dur: eighth },{ freq: 659.25, dur: eighth },
                { freq: 587.33, dur: eighth },{ freq: 493.88, dur: eighth },{ freq: 440, dur: quarter },{ freq: 0, dur: quarter },
                // Line 3: "Never gonna run around and desert you"
                { freq: 440, dur: eighth },{ freq: 493.88, dur: eighth },{ freq: 587.33, dur: eighth },{ freq: 493.88, dur: eighth },
                { freq: 369.99, dur: quarter },{ freq: 369.99, dur: eighth },{ freq: 329.63, dur: eighth },{ freq: 329.63, dur: eighth },
                { freq: 293.66, dur: eighth },{ freq: 329.63, dur: eighth },{ freq: 293.66, dur: dottedQuarter },{ freq: 0, dur: quarter },
                // Line 4: "Never gonna make you cry"
                { freq: 440, dur: eighth },{ freq: 493.88, dur: eighth },{ freq: 587.33, dur: eighth },{ freq: 493.88, dur: eighth },
                { freq: 369.99, dur: quarter },{ freq: 369.99, dur: eighth },{ freq: 329.63, dur: dottedQuarter },
                // Line 5: "Never gonna say goodbye"
                { freq: 440, dur: eighth },{ freq: 493.88, dur: eighth },{ freq: 587.33, dur: eighth },{ freq: 659.25, dur: eighth },
                { freq: 587.33, dur: eighth },{ freq: 493.88, dur: eighth },{ freq: 440, dur: quarter },{ freq: 0, dur: quarter },
                // Line 6: "Never gonna tell a lie and hurt you"
                { freq: 440, dur: eighth },{ freq: 493.88, dur: eighth },{ freq: 587.33, dur: eighth },{ freq: 493.88, dur: eighth },
                { freq: 369.99, dur: quarter },{ freq: 369.99, dur: eighth },{ freq: 329.63, dur: eighth },{ freq: 329.63, dur: eighth },
                { freq: 293.66, dur: eighth },{ freq: 329.63, dur: eighth },{ freq: 293.66, dur: dottedQuarter },{ freq: 0, dur: quarter },
            ];

            function initAudio() {
                if (audioCtx) return;
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
            }

            function playMelody() {
                if (!audioCtx || isPlaying) return;
                var time = audioCtx.currentTime + 0.1;
                var gainNode = audioCtx.createGain();
                gainNode.gain.value = 0.15;
                gainNode.connect(audioCtx.destination);
                notes.forEach(function(note) {
                    if (note.freq === 0) { time += note.dur; return; }
                    var osc = audioCtx.createOscillator();
                    osc.type = "square";
                    osc.frequency.value = note.freq;
                    var noteGain = audioCtx.createGain();
                    noteGain.gain.setValueAtTime(0.15, time);
                    noteGain.gain.exponentialRampToValueAtTime(0.01, time + note.dur - 0.02);
                    osc.connect(noteGain);
                    noteGain.connect(gainNode);
                    osc.start(time);
                    osc.stop(time + note.dur);
                    time += note.dur;
                });
                isPlaying = true;
                var dur = (time - audioCtx.currentTime) * 1000;
                melodyTimeout = setTimeout(function() { isPlaying = false; playMelody(); }, dur);
            }

            function showConsentBanner() {
                var existing = document.getElementById("audio-hint");
                if (existing) existing.remove();
                var banner = document.createElement("div");
                banner.id = "audio-hint";
                banner.style.cssText = "position:fixed;bottom:0;left:0;width:100%;z-index:50;background:#2b2d42;color:#edf2f4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:0 -2px 12px rgba(0,0,0,0.4);";
                banner.innerHTML = '<div style="flex:1;min-width:200px;">'
                    + '<div style="font-size:14px;font-weight:600;margin-bottom:4px;">We value your privacy (when aligned with our profits)</div>'
                    + '<div style="font-size:12px;opacity:0.8;">We use cookies to <s>track you</s> enhance your browsing experience. Your choice won\'t be remembered because, frankly, nobody cares. You\'ll see this again next time. Such is life. <a href="#" id="audio-hint-policy" style="color:#8ecae6;text-decoration:underline;">Cookie Policy</a></div>'
                    + '</div>'
                    + '<div style="display:flex;gap:8px;flex-shrink:0;">'
                    + '<button id="audio-hint-reject" style="background:transparent;border:1px solid #8d99ae;color:#edf2f4;padding:8px 20px;border-radius:4px;font-size:13px;cursor:pointer;">Reject All</button>'
                    + '<button id="audio-hint-accept" style="background:#5bcefa;border:none;color:#fff;padding:8px 20px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;">Accept All</button>'
                    + '</div>';
                document.body.appendChild(banner);
                function onConsent() {
                    banner.remove();
                    initAudio();
                    if (audioCtx && audioCtx.state === "suspended") {
                        audioCtx.resume().then(function() { playMelody(); });
                    } else {
                        playMelody();
                    }
                }
                banner.querySelector("#audio-hint-accept").addEventListener("click", onConsent);
                banner.querySelector("#audio-hint-reject").addEventListener("click", onConsent);
                banner.querySelector("#audio-hint-policy").addEventListener("click", function(e) { e.preventDefault(); onConsent(); });
            }

            showConsentBanner();

            // Any click or tap triggers the melody (maximum trolling)
            function ensureMelody() {
                initAudio();
                if (!audioCtx) return;
                if (audioCtx.state === "suspended") {
                    audioCtx.resume().then(function() {
                        if (!isPlaying) playMelody();
                    });
                } else if (!isPlaying) {
                    playMelody();
                }
            }
            document.addEventListener("click", ensureMelody);
            document.addEventListener("touchstart", ensureMelody);
        })();

        // --- Visual rickroll tease ---
        (function() {
            var lyrics = [
                "Never gonna give you up",
                "Never gonna let you down",
                "Never gonna run around and desert you",
                "Never gonna make you cry",
                "Never gonna say goodbye",
                "Never gonna tell a lie and hurt you"
            ];
            var lineIndex = 0;

            function spawnLyric() {
                var line = document.createElement("a");
                line.href = "/";
                line.textContent = lyrics[lineIndex % lyrics.length];
                lineIndex++;

                var top = 10 + Math.random() * 70;
                var left = Math.random() * 60;
                var duration = 8 + Math.random() * 6;
                var size = 0.7 + Math.random() * 0.5;

                line.style.cssText = "position:fixed;top:" + top + "%;left:" + left + "%;"
                    + "color:rgba(255,255,255,0.15);font-size:" + size + "em;"
                    + "text-decoration:none;pointer-events:auto;white-space:nowrap;"
                    + "z-index:0;transition:color 0.3s,transform 0.3s;"
                    + "animation:floatLyric " + duration + "s linear forwards;";

                line.addEventListener("mouseenter", function() {
                    line.style.color = "rgba(74,222,128,0.7)";
                    line.style.transform = "scale(1.15)";
                });
                line.addEventListener("mouseleave", function() {
                    line.style.color = "rgba(255,255,255,0.06)";
                    line.style.transform = "scale(1)";
                });

                document.body.appendChild(line);
                setTimeout(function() { line.remove(); }, duration * 1000);
            }

            // Inject animation keyframes
            var style = document.createElement("style");
            style.textContent = "@keyframes floatLyric {"
                + "0% { opacity:0; transform:translateX(0); }"
                + "10% { opacity:1; }"
                + "90% { opacity:1; }"
                + "100% { opacity:0; transform:translateX(30vw); }"
                + "}";
            document.head.appendChild(style);

            spawnLyric();
            setInterval(spawnLyric, 3000);
        })();
    </script>
