<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://gc.zgo.at; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://wraas.goatcounter.com; frame-ancestors 'none';">
    <title>W.R.A.A.S. Karaoke</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ---- Song Selection Screen ---- */
        .song-select {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2em 1em 4em;
            transition: opacity 0.5s ease;
        }

        .song-select.hidden {
            opacity: 0;
            pointer-events: none;
            position: absolute;
        }

        .page-logo {
            border: 2px solid #5bcefa;
            border-radius: 12px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 1em;
            margin-bottom: 0.8em;
        }

        .page-header-text {
            text-align: left;
        }

        .logo {
            font-size: clamp(1.5em, 4vw, 2.2em);
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.1em;
            letter-spacing: -0.02em;
        }

        .tagline {
            color: #888;
            font-size: 1em;
        }

        .search-wrap {
            width: 100%;
            max-width: 600px;
            position: relative;
            margin-bottom: 2em;
        }

        .search-bar {
            width: 100%;
            padding: 0.8em 1em 0.8em 2.8em;
            background: #161616;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar:focus { border-color: #5bcefa; }

        .search-icon {
            position: absolute;
            left: 0.9em;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            pointer-events: none;
        }

        .song-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1em;
            width: 100%;
            max-width: 1200px;
        }

        @media (min-width: 500px) {
            .song-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 800px) {
            .song-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (min-width: 1100px) {
            .song-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .song-card {
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1.2em 1.4em;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.15s, background 0.2s;
            position: relative;
            overflow: hidden;
        }

        .song-card:hover, .song-card:focus {
            border-color: #5bcefa;
            transform: translateY(-2px);
            background: #1a1a1a;
            outline: none;
        }

        .song-title {
            font-weight: 700;
            color: #fff;
            font-size: 1.05em;
            margin-bottom: 0.2em;
        }

        .song-artist {
            color: #888;
            font-size: 0.85em;
            margin-bottom: 0.6em;
        }

        .song-meta {
            display: flex;
            gap: 0.6em;
            align-items: center;
        }

        .song-tag {
            font-size: 0.7em;
            padding: 0.2em 0.6em;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.06);
            color: #666;
        }

        .song-tag.difficulty-easy { color: #5bcefa; background: rgba(91, 206, 250, 0.1); }
        .song-tag.difficulty-medium { color: #facc15; background: rgba(250, 204, 21, 0.1); }
        .song-tag.difficulty-hard { color: #f87171; background: rgba(248, 113, 113, 0.1); }
        .song-tag.difficulty-legendary { color: #facc15; background: rgba(250, 204, 21, 0.15); text-transform: uppercase; letter-spacing: 0.05em; }

        .sing-label {
            position: absolute;
            right: 1em;
            top: 50%;
            transform: translateY(-50%);
            color: #5bcefa;
            font-size: 0.8em;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .song-card:hover .sing-label,
        .song-card:focus .sing-label { opacity: 1; }

        /* ---- Loading Screen ---- */
        .loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .loading-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .loading-text {
            font-size: 1.1em;
            color: #888;
            margin-bottom: 1.5em;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #222;
            border-top-color: #5bcefa;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---- Karaoke Stage ---- */
        .karaoke-stage {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
            z-index: 50;
        }

        .karaoke-stage.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .rick-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.35;
        }

        /* Progress bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: #5bcefa;
            z-index: 60;
            width: 0%;
            transition: width linear;
            box-shadow: 0 0 8px rgba(91, 206, 250, 0.5);
        }

        /* Song info banner */
        .now-playing {
            position: fixed;
            top: 1.2em;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            text-align: center;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .now-playing.visible { opacity: 1; }

        .now-playing-label {
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #5bcefa;
            margin-bottom: 0.3em;
        }

        .now-playing-title {
            font-size: 1.1em;
            font-weight: 700;
            color: #fff;
        }

        .now-playing-artist {
            font-size: 0.85em;
            color: #888;
        }

        /* Lyrics display — karaoke-style sliding window */
        .karaoke-lyrics {
            position: relative;
            z-index: 55;
            width: 90%;
            max-width: 900px;
            text-align: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            font-weight: 700;
            font-size: clamp(1.4em, 5vw, 3em);
            line-height: 1.8;
            overflow: hidden;
        }

        .lyric-line {
            display: block;
            margin: 0.2em 0;
            color: rgba(255, 255, 255, 0.25);
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease, color 0.4s ease;
            transform: translateY(0.3em);
            position: relative;
        }

        .lyric-line.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .lyric-line.active {
            color: rgba(255, 255, 255, 0.35);
            font-size: 1.1em;
        }

        .lyric-line.sung {
            color: rgba(255, 255, 255, 0.12);
            transform: translateY(-0.1em) scale(0.95);
        }

        /* Sweeping fill overlay for active line — uses background-clip for proper multi-line sweep */
        .lyric-fill {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            text-align: center;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            background-image: linear-gradient(to right, #5bcefa 50%, transparent 50%);
            background-size: 200% 100%;
            background-position: 100% 0;
            text-shadow: none;
            pointer-events: none;
            transition: background-position linear;
            filter: drop-shadow(0 0 12px rgba(91, 206, 250, 0.5));
        }

        /* Mute button */
        .mute-btn {
            position: fixed;
            top: 1em;
            right: 1em;
            z-index: 60;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 3em;
            height: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.6s ease, background 0.3s ease;
        }

        .mute-btn.visible { opacity: 1; }

        .mute-btn:hover,
        .mute-btn:focus {
            background: rgba(255, 255, 255, 0.25);
            outline: 2px solid rgba(255, 255, 255, 0.3);
            outline-offset: 2px;
        }

        /* Back button */
        .back-btn {
            position: fixed;
            bottom: 1.2em;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            color: #888;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 0.5em 1.4em;
            font-size: 0.85em;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.6s ease, background 0.2s, color 0.2s;
        }

        .back-btn.visible { opacity: 1; }

        .back-btn:hover,
        .back-btn:focus {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            outline: 2px solid rgba(255, 255, 255, 0.3);
            outline-offset: 2px;
        }

        /* Score display (troll) */
        .score {
            position: fixed;
            bottom: 4em;
            right: 1.5em;
            z-index: 60;
            text-align: right;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .score.visible { opacity: 1; }

        .score-label {
            font-size: 0.65em;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
        }

        .score-value {
            font-size: 1.8em;
            font-weight: 800;
            color: #5bcefa;
            text-shadow: 0 0 12px rgba(91, 206, 250, 0.3);
        }

@media (prefers-reduced-motion: reduce) {
            .song-card { transition: none; }
            .loading-spinner { animation: none; }
            .loading-screen { transition: none; }
            .karaoke-stage { transition: none; }
            .song-select { transition: none; }
            .lyric-line { transition: none; }
            .mute-btn, .back-btn, .now-playing, .score { transition: none; }
            .progress-bar { transition: none; }
        }
    </style>
</head>

<body>
    <!-- Song Selection Screen -->
    <div class="song-select" id="song-select">
        <div class="page-header">
            <picture>
                <source srcset="/logo-200.webp" type="image/webp">
                <img src="/logo-200.png" alt="W.R.A.A.S. logo" width="70" height="70" class="page-logo">
            </picture>
            <div class="page-header-text">
                <div class="logo">W.R.A.A.S. Karaoke</div>
                <p class="tagline">We kaRaoke Any Artist, Seriously.</p>
            </div>
        </div>

        <div class="search-wrap">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input class="search-bar" type="text" placeholder="Search songs..." id="search-bar" spellcheck="false" autocomplete="off">
        </div>

        <div class="song-grid" id="song-grid"></div>

    </div>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
        <div class="loading-text" id="loading-text">Preparing karaoke track...</div>
        <div class="loading-spinner"></div>
    </div>

    <!-- Karaoke Stage -->
    <div class="karaoke-stage" id="karaoke-stage">
        <picture>
            <source srcset="/rick.webp" type="image/webp">
            <img class="rick-bg" src="/rick.gif" alt="" aria-hidden="true" loading="lazy">
        </picture>

        <div class="progress-bar" id="progress-bar"></div>

        <div class="now-playing" id="now-playing">
            <div class="now-playing-label">Now Playing</div>
            <div class="now-playing-title" id="np-title"></div>
            <div class="now-playing-artist" id="np-artist"></div>
        </div>

        <div class="karaoke-lyrics" id="karaoke-lyrics" aria-live="polite" aria-atomic="false"></div>

        <div class="score" id="score">
            <div class="score-label">Score</div>
            <div class="score-value" id="score-value">0</div>
        </div>
    </div>

    <button class="mute-btn" id="mute-btn" aria-label="Mute audio">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
    </button>

    <button class="back-btn" id="back-btn" aria-label="Back to song selection">Back to songs</button>

    <script>
    // Lazy-load karaoke module: defer heavy JS until user interaction or idle
    (function() {
        var loaded = false;
        function loadKaraoke() {
            if (loaded) return;
            loaded = true;
            var s = document.createElement("script");
            s.src = "karaoke.js";
            document.body.appendChild(s);
        }
        // Load on first interaction (click, key, touch)
        ["click", "keydown", "touchstart"].forEach(function(evt) {
            document.addEventListener(evt, loadKaraoke, { once: true });
        });
        // Fallback: load when browser is idle (or after 3s)
        if ("requestIdleCallback" in window) {
            requestIdleCallback(loadKaraoke, { timeout: 3000 });
        } else {
            setTimeout(loadKaraoke, 3000);
        }
    })();
    </script>
    <!-- GoatCounter analytics: SRI integrity hash pins the script to a known version.
         If analytics stops working, the hash may be stale — the check-sri workflow
         detects this daily and opens a PR to update it. -->
    <script data-goatcounter="https://wraas.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"
            integrity="sha384-DGiREytotlUiLflu8vLo0vvfxKWn36pKPT1ZBhh3R+3vhwrS/4p3H9eys9Zr2bPQ"
            crossorigin="anonymous"></script>
</body>

</html>
