name: Check YouTube Videos

on:
  pull_request:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check-videos:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract and check YouTube URLs
        run: |
          urls=$(grep -roEh 'https://www\.youtube\.com/(watch\?v=|embed/)[^"'"'"' ]*' docs/ || true)

          if [ -z "$urls" ]; then
            echo "No YouTube URLs found"
            exit 0
          fi

          failed=""
          while IFS= read -r url; do
            file=$(grep -rl "$url" docs/)
            # Extract video ID from both /watch?v=ID and /embed/ID formats
            video_id=$(echo "$url" | grep -oE '(v=|embed/)([^&?]*)' | sed 's/^v=//;s/^embed\///')
            # Check oEmbed API for removed/private videos
            oembed_status=$(curl -s -o /dev/null -w "%{http_code}" "https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${video_id}&format=json")
            # Check playability status for blocked/unavailable videos (copyright, region-lock, etc.)
            playability=$(curl -s "https://www.youtube.com/watch?v=${video_id}" | grep -o '"playabilityStatus":{[^}]*}' | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
            echo "Checking $url (found in $file) -> HTTP $oembed_status, playability: $playability"
            if [ "$oembed_status" != "200" ]; then
              failed="${failed}- \`${url}\` in \`${file}\` — removed or private (HTTP ${oembed_status})\n"
            elif [ "$playability" != "OK" ]; then
              failed="${failed}- \`${url}\` in \`${file}\` — ${playability:-UNKNOWN}\n"
            fi
          done <<< "$urls"

          if [ -n "$failed" ]; then
            echo "FAILED_URLS<<EOF" >> "$GITHUB_ENV"
            echo -e "$failed" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
            exit 1
          fi

      - name: Comment on pull request
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const body = `## Broken YouTube Video Detected

            The following YouTube video(s) appear to be unavailable:

            ${process.env.FAILED_URLS}

            Please verify and update the video URL(s).`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Open issue on failure
        if: failure() && github.event_name != 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const body = `## Broken YouTube Video Detected

            The following YouTube video(s) appear to be unavailable:

            ${process.env.FAILED_URLS}

            Please verify and update the video URL(s).`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Broken YouTube video detected',
              body: body,
              labels: ['bug']
            });
