name: Preview Build

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3.1.0

      - name: Build site
        id: build
        run: just build

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: preview-site-${{ github.event.pull_request.number }}
          path: _site
          retention-days: 7

      - name: Comment on pull request
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prNumber = context.issue.number;
            const artifactName = `preview-site-${prNumber}`;
            const comment = `## Preview Build

✅ Build completed successfully!

### Download Preview
The built site is available as an artifact: **${artifactName}**

To preview locally:
1. Download the artifact from the Actions tab
2. Unzip the archive
3. Open \`index.html\` in your browser

Or run a simple HTTP server:
\`\`\`bash
python3 -m http.server 8000
\`\`\`

Then visit http://localhost:8000`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });
